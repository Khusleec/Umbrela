name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: delivery-tracking

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: delivery_tracking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd services/auth && npm ci
        cd ../orders && npm ci
        cd ../drivers && npm ci
        cd ../notifications && npm ci
        cd ../analytics && npm ci
        cd ../../gateway && npm ci
        cd ../database && npm ci

    - name: Run database migrations
      run: |
        cd database
        npm run migrate
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: delivery_tracking_test
        DB_USER: postgres
        DB_PASSWORD: password

    - name: Run tests
      run: |
        cd services/auth && npm test
        cd ../orders && npm test
        cd ../drivers && npm test
        cd ../notifications && npm test
        cd ../analytics && npm test
        cd ../../gateway && npm test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: delivery_tracking_test
        DB_USER: postgres
        DB_PASSWORD: password
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-secret

    - name: Run linting
      run: |
        npx eslint services/*/src/**/*.js
        npx eslint gateway/src/**/*.js

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Log in to Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-

    - name: Build and push Auth Service
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./services/auth
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Order Service
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./services/orders
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/order-service:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Driver Service
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./services/drivers
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/driver-service:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Analytics Service
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./services/analytics
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/analytics-service:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Notification Service
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./services/notifications
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/notification-service:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push API Gateway
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: ./gateway
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Setup kubectl
      uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to Kubernetes
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update image tags in Kubernetes manifests
        sed -i "s|delivery-tracking/auth-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:${{ github.sha }}|g" k8s/services.yaml
        sed -i "s|delivery-tracking/order-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/order-service:${{ github.sha }}|g" k8s/services.yaml
        sed -i "s|delivery-tracking/driver-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/driver-service:${{ github.sha }}|g" k8s/services.yaml
        sed -i "s|delivery-tracking/analytics-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/analytics-service:${{ github.sha }}|g" k8s/services.yaml
        sed -i "s|delivery-tracking/notification-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/notification-service:${{ github.sha }}|g" k8s/services.yaml
        sed -i "s|delivery-tracking/api-gateway:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }}|g" k8s/gateway.yaml
        
        # Apply Kubernetes manifests
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        kubectl apply -f k8s/postgres.yaml
        kubectl apply -f k8s/redis.yaml
        kubectl apply -f k8s/services.yaml
        kubectl apply -f k8s/gateway.yaml
        
        # Wait for deployment to be ready
        kubectl rollout status deployment/auth-service -n delivery-tracking --timeout=300s
        kubectl rollout status deployment/order-service -n delivery-tracking --timeout=300s
        kubectl rollout status deployment/driver-service -n delivery-tracking --timeout=300s
        kubectl rollout status deployment/analytics-service -n delivery-tracking --timeout=300s
        kubectl rollout status deployment/notification-service -n delivery-tracking --timeout=300s
        kubectl rollout status deployment/api-gateway -n delivery-tracking --timeout=300s

    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Wait for services to be ready
        sleep 60
        
        # Get the external IP of the Ingress
        INGRESS_IP=$(kubectl get ingress delivery-ingress -n delivery-tracking -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        if [ -z "$INGRESS_IP" ]; then
          echo "Could not get Ingress IP"
          exit 1
        fi
        
        echo "Testing API at http://$INGRESS_IP"
        
        # Test health endpoints
        curl -f http://$INGRESS_IP/health || exit 1
        curl -f http://$INGRESS_IP/auth/health || exit 1
        curl -f http://$INGRESS_IP/orders/health || exit 1
        curl -f http://$INGRESS_IP/drivers/health || exit 1
        curl -f http://$INGRESS_IP/analytics/health || exit 1
        curl -f http://$INGRESS_IP/notifications/health || exit 1
        
        echo "Smoke tests passed!"

  security-scan:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6
      with:
        sarif_file: 'trivy-results.sarif'

  notify:
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      uses: 8398a7/action-slack@59b127a91e89ce70980e1bc926dca351ad0a1b32
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
